<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | MaySnack</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">

</head>
<body>

<header class="navbar">

    <h2 class="logo">MaySnack</h2>

    <ul class="nav-links">
        <li><a href="index.html">🏠 Home</a></li>
        <li><a href="orders.html">📦 Riwayat Pesanan</a></li>
    </ul>

</header>

<div class="profile-card">

    <div class="profile-header">
        <div class="avatar">👤</div>

        <h2 id="profileName">
            Nama User
        </h2>

        <p id="profileEmail">
            email@gmail.com
        </p>
    </div>

    <div class="profile-info">

        <div class="info-box">
            <span>Role</span>
            <h3 id="profileRole">Customer</h3>
        </div>

        <div class="info-box">
            <span>Status</span>
            <h3>Aktif</h3>
        </div>

        <div class="info-box">
            <span>Bergabung</span>
            <h3>2026</h3>
        </div>

    </div>

    <button onclick="logout()" class="logout-btn">
        
        -> Logout
    </button>

</div>

</section>

<script src="js/profile.js"></script>

</body>
</html>
